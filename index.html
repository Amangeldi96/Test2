<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 24px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .screen {
            display: none;
        }
        .screen.active {
            display: flex;
            flex-direction: column;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 24px;
            height: 24px;
            margin-bottom: 24px;
            padding: 0;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #111;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 15px;
            color: #666;
            line-height: 1.4;
            margin-bottom: 32px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            height: 54px;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 17px;
            color: #111;
            outline: none;
        }
        .input-field:focus {
            border-color: #222;
        }

        .primary-btn {
            width: 100%;
            height: 54px;
            background-color: #f5f5f5;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            color: #b5b5b5;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .primary-btn.enabled {
            background-color: #111;
            border-color: #111;
            color: #fff;
        }

        .code-inputs {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 24px;
        }
        .code-input {
            width: 48px;
            height: 48px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            outline: none;
        }
        .code-input:focus {
            border-color: #222;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1-ЭКРАН -->
    <div id="phone-screen" class="screen active">
        <h1>Регистрация</h1>
        <p class="subtitle">Укажите номер телефона</p>
        <div class="input-group">
            <div class="input-label">Номер телефона</div>
            <input type="tel" id="phone-input" class="input-field" placeholder="+996" value="+996">
        </div>
        <button id="send-code-btn" class="primary-btn" disabled>Продолжить</button>
    </div>

    <!-- 2-ЭКРАН -->
    <div id="code-screen" class="screen">
        <button id="back-to-phone" class="back-btn">←</button>
        <h1>Введите код</h1>
        <div class="code-inputs">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
        </div>
    </div>
</div>

<div id="recaptcha-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  
    const firebaseConfig = {
        apiKey: "AIzaSyA0XNjDbTnlw-KVtjUqLRmn9V4gncSkYmY",
        authDomain: "test2-4b9cc.firebaseapp.com",
        projectId: "test2-4b9cc",
        storageBucket: "test2-4b9cc.firebasestorage.app",
        messagingSenderId: "854440471746",
        appId: "1:854440471746:web:038015aca56f69bf10df5b",
        measurementId: "G-K6M4H74LFN"
    };

    const auth = getAuth(initializeApp(firebaseConfig));
    auth.languageCode = 'ru';

    window.recaptchaVerifier = new RecaptchaVerifier(auth, document.getElementById('recaptcha-container'), {
        'size': 'invisible'
    });

    const phoneInput = document.getElementById('phone-input');
    const sendCodeBtn = document.getElementById('send-code-btn');

    // Баскычты күйгүзүүчү функция
    function checkPhone() {
        const num = phoneInput.value.trim();
        if (num.length >= 13) { // +996 жана 9 цифра (жалпы 13 символ)
            sendCodeBtn.disabled = false;
            sendCodeBtn.classList.add('enabled');
        } else {
            sendCodeBtn.disabled = true;
            sendCodeBtn.classList.remove('enabled');
        }
    }

    // Текст жазганда да, барак жаңыланганда да иштесин
    phoneInput.addEventListener('input', checkPhone);
    window.addEventListener('load', checkPhone);
    checkPhone(); // Түз эле чакыруу

    sendCodeBtn.addEventListener('click', () => {
        sendCodeBtn.innerText = "Отправка...";
        sendCodeBtn.disabled = true;
        sendCodeBtn.classList.remove('enabled');

        signInWithPhoneNumber(auth, phoneInput.value.trim(), window.recaptchaVerifier)
            .then((result) => {
                window.confirmationResult = result;
                document.getElementById('phone-screen').classList.remove('active');
                document.getElementById('code-screen').classList.add('active');
            })
            .catch((err) => {
                alert("Ошибка: " + err.message);
                sendCodeBtn.innerText = "Продолжить";
                checkPhone();
                if(window.grecaptcha) window.grecaptcha.reset();
            });
    });

    document.querySelectorAll('.code-input').forEach((input, index, inputs) => {
        input.addEventListener('input', (e) => {
            if(e.target.value.length === 1 && index < 5) inputs[index+1].focus();
            const code = Array.from(inputs).map(i => i.value).join('');
            if(code.length === 6) {
                window.confirmationResult.confirm(code)
                    .then(() => alert("Успешно кирдиңиз!"))
                    .catch(() => alert("Код туура эмес!"));
            }
        });
    });
</script>

</body>
</html>
