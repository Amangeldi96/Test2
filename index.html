<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background-color: #ffffff; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px 20px; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
        .back-btn { background: none; border: none; cursor: pointer; width: 24px; height: 24px; margin-bottom: 16px; padding: 0; font-size: 20px; }
        h1 { font-size: 28px; font-weight: 700; color: #111; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #666; line-height: 1.4; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-label { font-size: 13px; color: #333; margin-bottom: 6px; }
        .input-field { width: 100%; height: 50px; border: 1px solid #d9d9d9; border-radius: 12px; padding: 0 14px; font-size: 16px; color: #111; outline: none; }
        .primary-btn { width: 100%; height: 50px; background-color: #111; border: 1px solid #111; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        .primary-btn:disabled { background-color: #f5f5f5; border-color: #e8e8e8; color: #b5b5b5; cursor: not-allowed; }
        .code-inputs { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 20px; }
        .code-input { width: 44px; height: 44px; border: 1px solid #d9d9d9; border-radius: 8px; text-align: center; font-size: 18px; font-weight: 600; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="phone-screen" class="screen active">
        <h1>Регистрация</h1>
        <p class="subtitle">Укажите номер телефона</p>
        <div class="input-group">
            <div class="input-label">Номер телефона</div>
            <input type="tel" id="phone-input" class="input-field" placeholder="+996" value="+996220604604">
        </div>
        <button id="send-code-btn" class="primary-btn">Продолжить</button>
    </div>

    <div id="code-screen" class="screen">
        <button id="back-to-phone" class="back-btn">←</button>
        <h1>Введите код</h1>
        <div class="code-inputs">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
            <input type="text" maxlength="1" class="code-input" pattern="[0-9]*" inputmode="numeric">
        </div>
    </div>
</div>

<div id="recaptcha-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  
    const firebaseConfig = {
        apiKey: "AIzaSyA0XNjDbTnlw-KVtjUqLRmn9V4gncSkYmY",
        authDomain: "test2-4b9cc.firebaseapp.com",
        projectId: "test2-4b9cc",
        storageBucket: "test2-4b9cc.firebasestorage.app",
        messagingSenderId: "854440471746",
        appId: "1:854440471746:web:038015aca56f69bf10df5b",
        measurementId: "G-K6M4H74LFN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = 'ru';

    const phoneInput = document.getElementById('phone-input');
    const sendCodeBtn = document.getElementById('send-code-btn');

    // Капчаны объект катары туура инициализациялоо
    window.recaptchaVerifier = new RecaptchaVerifier(auth, document.getElementById('recaptcha-container'), {
        'size': 'invisible',
        'callback': (response) => {}
    });

    sendCodeBtn.addEventListener('click', () => {
        const phoneNumber = phoneInput.value.trim();
        sendCodeBtn.innerText = "Отправка...";
        sendCodeBtn.disabled = true;

        signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
            .then((result) => {
                window.confirmationResult = result;
                document.getElementById('phone-screen').classList.remove('active');
                document.getElementById('code-screen').classList.add('active');
            })
            .catch((err) => {
                // КАТАНЫ ЭКРАНГА ЧЫГАРУУ (Маселе каякта экенин дароо көрөбүз)
                alert("КАТА АНЫКТАЛДЫ:\n" + err.code + "\n" + err.message);
                sendCodeBtn.innerText = "Продолжить";
                sendCodeBtn.disabled = false;
                if(window.grecaptcha) window.grecaptcha.reset();
            });
    });

    document.getElementById('back-to-phone').addEventListener('click', () => {
        document.getElementById('code-screen').classList.remove('active');
        document.getElementById('phone-screen').classList.add('active');
        sendCodeBtn.innerText = "Продолжить";
        sendCodeBtn.disabled = false;
    });

    document.querySelectorAll('.code-input').forEach((input, index, inputs) => {
        input.addEventListener('input', (e) => {
            if(e.target.value.length === 1 && index < 5) inputs[index+1].focus();
            const code = Array.from(inputs).map(i => i.value).join('');
            if(code.length === 6) {
                window.confirmationResult.confirm(code)
                    .then(() => alert("Ийгиликтүү кирдиңиз!"))
                    .catch((error) => alert("Код ката: " + error.message));
            }
        });
    });
</script>

</body>
</html>
